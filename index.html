<!DOCTYPE html>
<html>
<head>

        h1 { font-size: 50px; }
        .message { font-size: 24px; margin-top: 20px; }
        .cake { font-size: 100px; margin: 20px; }

    <button onclick="alert('I Love You! Have a great day!')">Click for a Surprise!</button>

</html>
