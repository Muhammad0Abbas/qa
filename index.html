<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My bandri 👑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #050505; color: white;
            font-family: 'Playfair Display', serif; overflow: hidden;
        }

        /* Start Screen */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; 
            justify-content: center; align-items: center; flex-direction: column;
            transition: 1s;
        }

        .q-logo {
            font-family: 'Dancing Script', cursive;
            font-size: 8rem; color: #ff4d6d;
            text-shadow: 0 0 30px #ff4d6d;
            animation: pulse 2s infinite;
        }

        /* Slides Container */
        .slider {
            width: 100%; height: 100%;
            display: none; position: relative;
        }

        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            transform: translateX(100%);
            transition: transform 1.5s ease-in-out;
        }

        .slide.active { transform: translateX(0); }
        .slide.exit { transform: translateX(-100%); }

        .slide h1 { font-size: 3.5rem; margin: 10px 0; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .slide p { font-size: 1.5rem; color: #ffb1c1; max-width: 80%; }

        .btn-start {
            padding: 15px 50px; font-size: 1.2rem; border-radius: 50px; border: 2px solid #ff4d6d;
            background: transparent; color: #ff4d6d; font-weight: bold; cursor: pointer;
            margin-top: 20px; transition: 0.5s;
        }
        .btn-start:hover { background: #ff4d6d; color: white; box-shadow: 0 0 30px #ff4d6d; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Hearts Background */
        .heart { position: absolute; color: rgba(255, 77, 109, 0.4); pointer-events: none; animation: fly 10s linear infinite; z-index: 1; }
        @keyframes fly {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="q-logo">Q</div>
        <button class="btn-start" onclick="startSurprise()">Open Your Gift bandri 🎁</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div class="slider" id="mainSlider">
        <div class="slide active">
            <div class="q-logo" style="font-size: 4rem;">Q</div>
            <h1 class="animate__animated animate__backInDown">Happy Birthday kali!</h1>
            <p>To the bandri who rules my heart and world. ✨</p>
        </div>

        <div class="slide">
            <div class="q-logo" style="font-size: 4rem;">Q</div>
            <h1>I Love You</h1>
            <p>More than words can express, today and forever. ❤️</p>
        </div>

        <div class="slide">
            <div class="q-logo" style="font-size: 4rem;">Q</div>
            <h1>My Everything</h1>
            <p>May your day be filled with as much joy as you give me. 💍</p>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function startSurprise() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainSlider').style.display = 'block';
                document.getElementById('bgMusic').play();
                
                // Start Slide Rotation
                setInterval(nextSlide, 15000); // 15 Seconds Change
            }, 1000);
        }

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            slides[currentSlide].classList.add('exit');

            currentSlide = (currentSlide + 1) % slides.length;

            slides[currentSlide].classList.remove('exit');
            slides[currentSlide].classList.add('active');
            
            // Clean up exit class after transition
            setTimeout(() => {
                document.querySelectorAll('.slide:not(.active)').forEach(s => s.classList.remove('exit'));
            }, 1500);
        }

        // Heart Generator
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 25 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 5 + 7 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 10000);
        }, 400);
    </script>
</body>
</html>
